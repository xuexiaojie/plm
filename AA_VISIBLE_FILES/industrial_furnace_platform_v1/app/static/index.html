<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>工业炉计算平台 V1</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f7;
      --panel: #ffffff;
      --ink: #142033;
      --muted: #68758a;
      --line: #d8e0ea;
      --blue: #1d4ed8;
      --green: #047857;
      --red: #b91c1c;
      --amber: #b45309;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, var(--bg) 60%, #dbeafe 100%);
      color: var(--ink);
    }
    header {
      padding: 28px 32px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .78);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 5;
    }
    h1 { margin: 0 0 8px; font-size: clamp(24px, 4vw, 38px); letter-spacing: -.04em; }
    .subtitle { color: var(--muted); max-width: 840px; line-height: 1.6; }
    main { display: grid; grid-template-columns: 360px minmax(0, 1fr); gap: 18px; padding: 18px; }
    section, aside { background: rgba(255,255,255,.9); border: 1px solid var(--line); border-radius: 18px; box-shadow: 0 20px 45px rgba(15, 23, 42, .08); }
    aside { padding: 18px; height: max-content; position: sticky; top: 126px; }
    section { padding: 18px; margin-bottom: 18px; }
    h2 { margin: 0 0 14px; font-size: 18px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    select, input, textarea, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      background: #fff;
      color: var(--ink);
    }
    textarea { min-height: 150px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; }
    button { cursor: pointer; background: var(--blue); color: white; border-color: var(--blue); font-weight: 700; }
    button.secondary { background: #fff; color: var(--blue); }
    button.green { background: var(--green); border-color: var(--green); }
    button.amber { background: var(--amber); border-color: var(--amber); }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .stack { display: grid; gap: 12px; }
    .row { display: flex; gap: 10px; align-items: center; }
    .row > * { flex: 1; }
    .card-list { display: grid; gap: 10px; }
    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fbfdff;
    }
    .card strong { display: block; margin-bottom: 4px; }
    .meta { color: var(--muted); font-size: 12px; line-height: 1.5; }
    .pill { display: inline-flex; border-radius: 999px; padding: 3px 8px; font-size: 12px; background: #e0ecff; color: #1746a2; margin-right: 4px; }
    .ok { color: var(--green); }
    .bad { color: var(--red); }
    pre {
      white-space: pre-wrap;
      overflow: auto;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 14px;
      padding: 14px;
      min-height: 170px;
      max-height: 380px;
      font-size: 12px;
    }
    @media (max-width: 880px) {
      main { grid-template-columns: 1fr; }
      aside { position: static; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>工业炉计算平台 V1.0 操作台</h1>
    <div class="subtitle">这是 V1 演示闭环：初始化样例数据，选择炉型名目，执行升温计算，提交审批，生成报告，并创建横向对比组。</div>
  </header>
  <main>
    <aside class="stack">
      <div>
        <label for="role">当前角色</label>
        <select id="role">
          <option value="engineer">普通计算人员</option>
          <option value="reviewer">审核人</option>
          <option value="template_admin">模板管理员</option>
          <option value="algorithm_admin">算法维护人员</option>
          <option value="admin" selected>系统管理员</option>
          <option value="readonly">只读用户</option>
        </select>
      </div>
      <button onclick="seedDemo()">初始化样例数据</button>
      <button class="secondary" onclick="loadAll()">刷新数据</button>
      <div>
        <label>状态输出</label>
        <pre id="log">等待操作...</pre>
      </div>
    </aside>
    <div>
      <section>
        <h2>项目与名目</h2>
        <div class="grid">
          <div class="stack">
            <label for="project">项目</label>
            <select id="project" onchange="loadItems()"></select>
          </div>
          <div class="stack">
            <label for="item">名目</label>
            <select id="item" onchange="loadNodes()"></select>
          </div>
        </div>
        <div id="nodes" class="card-list" style="margin-top: 12px"></div>
      </section>
      <section>
        <h2>升温计算</h2>
        <div class="grid">
          <div>
            <label for="node">计算节点</label>
            <select id="node"></select>
          </div>
          <div>
            <label for="scenario">快捷工况</label>
            <select id="scenario" onchange="fillScenario()">
              <option value="normal">正常可行工况</option>
              <option value="violation">超限校核工况</option>
            </select>
          </div>
        </div>
        <div style="margin-top: 12px">
          <label for="inputs">输入参数 JSON</label>
          <textarea id="inputs"></textarea>
        </div>
        <div class="row" style="margin-top: 12px">
          <button onclick="runExecution()">执行计算</button>
          <button class="secondary" onclick="loadExecutions()">刷新执行记录</button>
        </div>
        <div id="executions" class="card-list" style="margin-top: 12px"></div>
      </section>
      <section>
        <h2>审批与报告</h2>
        <div class="grid">
          <div>
            <label for="executionId">执行 ID</label>
            <input id="executionId" placeholder="执行后自动填充">
          </div>
          <div>
            <label for="approvalId">审批 ID</label>
            <input id="approvalId" placeholder="提交审批后自动填充">
          </div>
        </div>
        <div class="row" style="margin-top: 12px">
          <button onclick="submitApproval()">提交审批</button>
          <button class="green" onclick="approve()">审批通过</button>
          <button class="amber" onclick="returnApproval()">退回</button>
        </div>
        <div class="row" style="margin-top: 12px">
          <button onclick="createReport()">生成报告</button>
          <button class="secondary" onclick="downloadReport()">下载报告文本</button>
        </div>
      </section>
      <section>
        <h2>横向对比</h2>
        <div>
          <label for="resultIds">结果 ID，逗号分隔</label>
          <input id="resultIds" placeholder="执行记录会自动填充最近结果">
        </div>
        <div class="row" style="margin-top: 12px">
          <button onclick="createComparison()">创建对比组</button>
          <button class="secondary" onclick="loadComparison()">查看对比结果</button>
        </div>
        <div id="comparison" style="margin-top: 12px"></div>
      </section>
      <section>
        <h2>资料管理</h2>
        <div class="grid">
          <div>
            <label for="artifactType">资料类型</label>
            <select id="artifactType">
              <option value="site_feedback">现场反馈</option>
              <option value="drawing_review">审图单</option>
              <option value="technical_attachment">技术附件</option>
              <option value="drawing_catalog">图纸目录</option>
            </select>
          </div>
          <div>
            <label for="artifactTitle">标题</label>
            <input id="artifactTitle" value="装出钢机现场反馈">
          </div>
        </div>
        <div style="margin-top: 12px">
          <label for="artifactContent">资料内容</label>
          <textarea id="artifactContent">装出钢机现场安装空间与计算假设需要联合复核，审图意见要求确认接口尺寸，技术附件提供了设备参数版本。</textarea>
        </div>
        <div class="row" style="margin-top: 12px">
          <button onclick="createArtifact()">新增资料</button>
          <button onclick="createArtifactsBatch()">按项目批量录入</button>
          <button class="secondary" onclick="loadArtifacts()">刷新资料</button>
        </div>
        <div style="margin-top: 12px">
          <label for="batchArtifacts">批量资料 JSON，支持项目级录入，`project_item_id` 可为空</label>
          <textarea id="batchArtifacts"></textarea>
        </div>
        <div id="artifacts" class="card-list" style="margin-top: 12px"></div>
      </section>
      <section>
        <h2>AI 联合分析</h2>
        <div class="grid">
          <div>
            <label for="equipmentName">设备名称</label>
            <input id="equipmentName" value="装出钢机">
          </div>
          <div>
            <label for="artifactIds">资料 ID，逗号分隔</label>
            <input id="artifactIds" placeholder="资料列表会自动填充">
          </div>
        </div>
        <div style="margin-top: 12px">
          <label for="aiQuestion">分析问题</label>
          <textarea id="aiQuestion">请联合分析同一装出钢机的计算结果、现场反馈、审图单、技术附件和图纸目录，并按物质流、能量流、信息流三个维度输出风险点、矛盾点和建议。</textarea>
        </div>
        <button style="margin-top: 12px" onclick="runAiAnalysis()">启动大模型 API 联合分析</button>
        <div id="analyses" class="card-list" style="margin-top: 12px"></div>
      </section>
    </div>
  </main>
  <script>
    const state = { projects: [], items: [], nodes: [], executions: [], artifacts: [], comparisonId: null, reportId: null };
    const normalInputs = {
      material_type: "carbon_steel",
      workpiece_thickness_mm: 120,
      initial_temp_c: 25,
      target_discharge_temp_c: 1180,
      residence_time_min: 180
    };
    const violationInputs = {
      material_type: "carbon_steel",
      workpiece_thickness_mm: 240,
      initial_temp_c: 25,
      target_discharge_temp_c: 1180,
      residence_time_min: 45
    };
    function roleHeaders() { return { "X-Role": document.getElementById("role").value }; }
    function show(data) { document.getElementById("log").textContent = typeof data === "string" ? data : JSON.stringify(data, null, 2); }
    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>'"]/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;" }[char]));
    }
    async function api(path, options = {}) {
      const response = await fetch(path, { ...options, headers: { "Content-Type": "application/json", ...roleHeaders(), ...(options.headers || {}) } });
      const type = response.headers.get("content-type") || "";
      const body = type.includes("application/json") ? await response.json() : await response.text();
      if (!response.ok) throw body;
      return body;
    }
    function fillSelect(id, rows, label) {
      document.getElementById(id).innerHTML = rows.map(row => `<option value="${row.id}">${label(row)}</option>`).join("");
    }
    async function seedDemo() { try { show(await api("/api/seed", { method: "POST" })); await loadAll(); } catch (error) { show(error); } }
    async function loadAll() { await loadProjects(); await loadExecutions(); await loadArtifacts(); }
    async function loadProjects() {
      state.projects = await api("/api/projects");
      fillSelect("project", state.projects, row => `${row.code} | ${row.name}`);
      await loadItems();
    }
    async function loadItems() {
      const projectId = document.getElementById("project").value;
      if (!projectId) return;
      state.items = await api(`/api/projects/${projectId}/items`);
      fillSelect("item", state.items, row => `${row.code} | ${row.name}`);
      await loadNodes();
    }
    async function loadNodes() {
      const itemId = document.getElementById("item").value;
      if (!itemId) return;
      state.nodes = await api(`/api/items/${itemId}/nodes`);
      document.getElementById("nodes").innerHTML = state.nodes.map(node => `<div class="card"><strong>${escapeHtml(node.name)}</strong><span class="pill">${escapeHtml(node.node_type)}</span><span class="meta">节点 ID: ${node.id}，模板 ID: ${node.template_id || "无"}</span></div>`).join("");
      fillSelect("node", state.nodes.filter(node => node.node_type === "calc"), row => `${row.id} | ${row.name}`);
    }
    function fillScenario() {
      const value = document.getElementById("scenario").value;
      document.getElementById("inputs").value = JSON.stringify(value === "normal" ? normalInputs : violationInputs, null, 2);
    }
    function fillBatchArtifacts() {
      document.getElementById("batchArtifacts").value = JSON.stringify([
        { project_item_id: null, artifact_type: "site_feedback", title: "装出钢机现场反馈", source_code: "FB-001", content: "现场反馈：装出钢机安装空间需与计算假设联合复核。" },
        { project_item_id: null, artifact_type: "drawing_review", title: "装出钢机审图单", source_code: "DR-001", content: "审图单：要求确认装出钢机接口尺寸和土建预留条件。" },
        { project_item_id: null, artifact_type: "technical_attachment", title: "装出钢机技术附件", source_code: "TA-001", content: "技术附件：包含装出钢机电机功率、行程、速度和载荷参数。" },
        { project_item_id: null, artifact_type: "drawing_catalog", title: "装出钢机图纸目录", source_code: "DC-001", content: "图纸目录：包含总图、基础图、接口图和安装图版本清单。" }
      ], null, 2);
    }
    async function runExecution() {
      try {
        const nodeId = document.getElementById("node").value;
        const inputs = JSON.parse(document.getElementById("inputs").value);
        const result = await api(`/api/nodes/${nodeId}/executions`, { method: "POST", body: JSON.stringify({ inputs }) });
        show(result);
        await loadExecutions();
      } catch (error) { show(error); }
    }
    async function loadExecutions() {
      state.executions = await api("/api/executions");
      document.getElementById("executions").innerHTML = state.executions.map(row => `<div class="card"><strong>执行 ${row.id}</strong><span class="pill">${escapeHtml(row.status)}</span><span class="pill ${row.feasible ? "ok" : "bad"}">${row.feasible === null ? "无结果" : row.feasible ? "可行" : "不可行"}</span><div class="meta">结果 ID: ${row.result_id || "无"}，耗时: ${row.duration_ms || 0} ms</div></div>`).join("");
      if (state.executions[0]) document.getElementById("executionId").value = state.executions[0].id;
      const ids = state.executions.map(row => row.result_id).filter(Boolean).slice(0, 2);
      if (ids.length) document.getElementById("resultIds").value = ids.join(",");
    }
    async function submitApproval() {
      try {
        const result = await api(`/api/executions/${document.getElementById("executionId").value}/approval`, { method: "POST" });
        document.getElementById("approvalId").value = result.id;
        show(result);
      } catch (error) { show(error); }
    }
    async function approve() {
      try { show(await api(`/api/approvals/${document.getElementById("approvalId").value}/approve`, { method: "POST" })); } catch (error) { show(error); }
    }
    async function returnApproval() {
      try { show(await api(`/api/approvals/${document.getElementById("approvalId").value}/return`, { method: "POST" })); } catch (error) { show(error); }
    }
    async function createReport() {
      try {
        const result = await api(`/api/executions/${document.getElementById("executionId").value}/reports`, { method: "POST" });
        state.reportId = result.id;
        show(result);
      } catch (error) { show(error); }
    }
    async function downloadReport() {
      try {
        if (!state.reportId) throw "请先生成报告";
        show(await api(`/api/reports/${state.reportId}/download`, { headers: roleHeaders() }));
      } catch (error) { show(error); }
    }
    async function createComparison() {
      try {
        const resultIds = document.getElementById("resultIds").value.split(",").map(value => Number(value.trim())).filter(Boolean);
        const result = await api("/api/comparisons", { method: "POST", body: JSON.stringify({ name: "V1 升温计算横向对比", step_type: "temp_profile", result_ids: resultIds }) });
        state.comparisonId = result.id;
        show(result);
      } catch (error) { show(error); }
    }
    async function loadComparison() {
      try {
        if (!state.comparisonId) throw "请先创建对比组";
        const result = await api(`/api/comparisons/${state.comparisonId}`);
        document.getElementById("comparison").innerHTML = result.results.map(row => `<div class="card"><strong>结果 ${row.result_id}</strong><span class="pill ${row.feasible ? "ok" : "bad"}">${row.feasible ? "可行" : "不可行"}</span><div class="meta">最终平均温度: ${escapeHtml(row.outputs.final_average_temp_c)} ℃，表里温差: ${escapeHtml(row.outputs.surface_core_delta_c)} ℃</div></div>`).join("");
        show(result);
      } catch (error) { show(error); }
    }
    async function createArtifact() {
      try {
        const projectId = document.getElementById("project").value;
        const itemId = Number(document.getElementById("item").value);
        const result = await api(`/api/projects/${projectId}/artifacts`, {
          method: "POST",
          body: JSON.stringify({
            project_item_id: itemId,
            artifact_type: document.getElementById("artifactType").value,
            title: document.getElementById("artifactTitle").value,
            source_code: "UI-DEMO",
            content: document.getElementById("artifactContent").value
          })
        });
        show(result);
        await loadArtifacts();
      } catch (error) { show(error); }
    }
    async function createArtifactsBatch() {
      try {
        const projectId = document.getElementById("project").value;
        const items = JSON.parse(document.getElementById("batchArtifacts").value);
        const result = await api(`/api/projects/${projectId}/artifacts/batch`, {
          method: "POST",
          body: JSON.stringify({ items })
        });
        show(result);
        await loadArtifacts();
      } catch (error) { show(error); }
    }
    async function loadArtifacts() {
      const projectId = document.getElementById("project").value;
      if (!projectId) return;
      const itemId = document.getElementById("item").value;
      state.artifacts = await api(`/api/projects/${projectId}/artifacts?project_item_id=${itemId}`);
      document.getElementById("artifacts").innerHTML = state.artifacts.map(row => `<div class="card"><strong>${escapeHtml(row.title)}</strong><span class="pill">${escapeHtml(row.type_name)}</span><div class="meta">资料 ID: ${row.id}，来源: ${escapeHtml(row.source_code || "无")}</div><div class="meta">${escapeHtml(row.content)}</div></div>`).join("");
      if (state.artifacts.length) document.getElementById("artifactIds").value = state.artifacts.map(row => row.id).join(",");
    }
    async function runAiAnalysis() {
      try {
        const projectId = document.getElementById("project").value;
        const itemId = Number(document.getElementById("item").value);
        const executionIds = document.getElementById("executionId").value ? [Number(document.getElementById("executionId").value)] : [];
        const artifactIds = document.getElementById("artifactIds").value.split(",").map(value => Number(value.trim())).filter(Boolean);
        const result = await api(`/api/projects/${projectId}/ai-analyses`, {
          method: "POST",
          body: JSON.stringify({
            project_item_id: itemId,
            equipment_name: document.getElementById("equipmentName").value,
            execution_ids: executionIds,
            artifact_ids: artifactIds,
            question: document.getElementById("aiQuestion").value
          })
        });
        const flows = result.result.three_flows ? `<div class="meta">物质流: ${escapeHtml((result.result.three_flows.material_flow || []).join("；"))}</div><div class="meta">能量流: ${escapeHtml((result.result.three_flows.energy_flow || []).join("；"))}</div><div class="meta">信息流: ${escapeHtml((result.result.three_flows.information_flow || []).join("；"))}</div>` : "";
        document.getElementById("analyses").innerHTML = `<div class="card"><strong>分析 ${result.id}</strong><span class="pill">${escapeHtml(result.provider)}</span><span class="pill">${escapeHtml(result.status)}</span><div class="meta">${escapeHtml(result.result.summary || "已返回分析结果")}</div>${flows}</div>`;
        show(result);
      } catch (error) { show(error); }
    }
    fillScenario();
    fillBatchArtifacts();
    loadAll().catch(show);
  </script>
</body>
</html>
